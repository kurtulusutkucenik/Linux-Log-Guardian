apiVersion: v1
kind: ServiceAccount
metadata:
  name: log-guardian-operator
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: log-guardian-operator-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "update"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: log-guardian-operator-binding
subjects:
- kind: ServiceAccount
  name: log-guardian-operator
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: log-guardian-operator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-guardian-operator
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-guardian-operator
  template:
    metadata:
      labels:
        app: log-guardian-operator
    spec:
      serviceAccountName: log-guardian-operator
      containers:
      - name: operator
        image: log-guardian-operator:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8082
        env:
        - name: PORT
          value: "8082"
---
apiVersion: v1
kind: Service
metadata:
  name: log-guardian-operator
  namespace: kube-system
spec:
  selector:
    app: log-guardian-operator
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
