name: Linux Log Guardian CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang llvm libbpf-dev libxdp-dev libpcre2-dev libsqlite3-dev \
          libcurl4-openssl-dev libssl-dev liburing-dev libseccomp-dev pkg-config curl

    - name: Build Fallback Mode (No XDP)
      run: make fallback

    - name: Build Native
      run: |
        make clean
        make check-deps
        make

    - name: Rust toolchain (Wasm plugins)
      uses: dtolnay/rust-toolchain@stable

    - name: Wasm release build (HAVE_WASM=1)
      run: bash scripts/wasm_gate.sh

    - name: CI offline core gate
      run: bash scripts/ci_core_gate.sh
      env:
        LOGANALYZER_PASSWORD: "DegistirBeni!123"
        COMPETITIVE_FAST: "1"
        SKIP_BAN_BENCH: "1"
        LIVE: "0"
        REQUIRE_WASM_NATIVE: "1"
        LG_SYNC_NO_SUDO: "1"
        LG_SKIP_DASHBOARD_SYNC: "1"

    - name: Upload proof artefacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: competitive-proof
        path: |
          real-attack-report.json
          bench-vs-modsec.json
          fp-report.json
          lineage-live-report.json
          wasm-status.json

    - name: Webhook config smoke (dry-run)
      run: bash scripts/webhook_smoke_test.sh

  k8s-operator:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - name: Build K8s operator
      working-directory: k8s-operator
      run: go build -v .
    - name: Admission webhook smoke
      run: bash scripts/k8s_admission_test.sh

  wasm:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v3

    - name: Install build deps
      run: |
        sudo apt-get update
        sudo apt-get install -y clang curl pkg-config libpcre2-dev libsqlite3-dev \
          libcurl4-openssl-dev libssl-dev liburing-dev libbpf-dev libxdp-dev libseccomp-dev

    - name: Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Wasm gate (HAVE_WASM=1)
      run: bash scripts/wasm_gate.sh

    - name: Upload wasm status
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: wasm-status
        path: wasm-status.json
