name: Website Gate

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "scripts/website_deploy_gate.sh"
      - "scripts/landing_sync_assets.sh"
      - "scripts/sync_evidence_pack.sh"
      - "wrangler.toml"
      - ".github/workflows/website.yml"
  pull_request:
    branches: [main]
    paths:
      - "landing/**"
      - "scripts/website_deploy_gate.sh"
      - "scripts/landing_sync_assets.sh"
      - "scripts/sync_evidence_pack.sh"
      - "wrangler.toml"
      - ".github/workflows/website.yml"

jobs:
  website:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy gate (landing build + verify)
        env:
          CI: "true"
        run: bash scripts/website_deploy_gate.sh

      - name: Cloudflare Pages output dogrulama
        run: |
          test -f wrangler.toml
          grep -q 'pages_build_output_dir = "landing/out"' wrangler.toml
          test -f landing/out/index.html
          test -f landing/out/404.html
          test -f landing/out/_headers
          test -f landing/out/_redirects
