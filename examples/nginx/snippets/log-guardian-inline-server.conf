# Linux Log Guardian — inline WAF server parcalari
# server {} icinde log-guardian-inline-consult.conf ile birlikte include edin.
# location / icinde: auth_request /_lg_consult;

error_page 403 = @lg_blocked;

location @lg_blocked {
    default_type application/json;
    return 403 '{"error":"blocked by log-guardian","source":"inline-consult"}';
}
