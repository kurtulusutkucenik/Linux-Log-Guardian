# Log Guardian — server location limitleri
# server {} icinde: include snippets/log-guardian-server.conf;

client_body_buffer_size 16k;
access_log /var/log/nginx/access.log log_guardian;

limit_conn lg_conn 50;
limit_req zone=lg_general burst=60 nodelay;

location = /wp-login.php {
    limit_req zone=lg_login burst=3 nodelay;
    try_files $uri @backend;
}

location = /api/login {
    limit_req zone=lg_login burst=5 nodelay;
    try_files $uri @backend;
}

location / {
    try_files $uri @backend;
}

location @backend {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
