# Telegram Bot API setWebhook — nginx TLS → log-guardian API
#
# Gereksinimler:
#   rules.conf: API_PORT=8090, WEBHOOK_TELEGRAM_BOT=1
#   webhook.env:
#     WEBHOOK_TELEGRAM_WEBHOOK_URL=https://YOUR_DOMAIN/telegram/webhook
#     WEBHOOK_TELEGRAM_WEBHOOK_SECRET=uzun-rastgele-dize   # opsiyonel ama onerilir
#
# Kurulum:
#   1. Bu dosyayi HTTPS server {} icine include edin
#   2. sudo systemctl restart log-guardian
#   3. bash scripts/telegram_webhook_register.sh --check
#
# Telegram yalnizca HTTPS (443) kabul eder; localhost URL calismaz.

location = /telegram/webhook {
    proxy_pass http://127.0.0.1:8090/telegram/webhook;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    client_max_body_size 64k;
}
