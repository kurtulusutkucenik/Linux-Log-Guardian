# Log Guardian — local TLS :443 (JA3 live proof)
# Kurulum: sudo bash scripts/nginx_tls_local_setup.sh
# server {} — ssl_certificate yollari setup script tarafindan yazilir

listen 443 ssl default_server;
listen [::]:443 ssl default_server;
server_name localhost;

ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;

access_log /var/log/nginx/access.log log_guardian;

client_body_buffer_size 16k;
limit_conn lg_conn 50;
limit_req zone=lg_general burst=60 nodelay;

location / {
    return 200 "log-guardian tls ok\n";
    add_header Content-Type text/plain;
}
