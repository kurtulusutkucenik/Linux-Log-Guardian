# Enterprise ban API — mTLS edge → loopback api_server.c
# Kurulum:
#   bash scripts/mtls_client_issue.sh
#   sudo cp examples/nginx/snippets/log-guardian-api-mtls.conf /etc/nginx/snippets/
#   include /etc/nginx/snippets/log-guardian-api-mtls.conf;  # server {} icinde
#
# Internal mutation token: /etc/log-guardian/mtls/nginx-mutation-token.inc (chmod 600)
#   set $lg_mutation_token "<API_MUTATION_TOKEN>";

ssl_client_certificate /etc/log-guardian/mtls/ca.crt;
ssl_verify_client on;
ssl_verify_depth 2;

location /api/v1/ {
    if ($ssl_client_verify != SUCCESS) {
        return 403;
    }
    include /etc/log-guardian/mtls/nginx-mutation-token.inc;
    proxy_set_header X-Guardian-Token $lg_mutation_token;
    proxy_set_header Host $host;
    proxy_pass http://127.0.0.1:8090;
    proxy_connect_timeout 2s;
    proxy_read_timeout 10s;
}
