# nginx inline WAF consult — auth_request → log-guardian API :8090
# Kurulum:
#   1. rules.conf: API_PORT=8090 (varsayilan)
#   2. systemctl restart log-guardian
#   3. server {} icinde: include snippets/log-guardian-inline-consult.conf;
#
# Dürüst sinir: consult = ayni WAF motoru; log replay kadar tam POST body degil
# (buyuk body icin log_guardian format + log hat oncelikli).

location = /_lg_consult {
    internal;
    proxy_pass http://127.0.0.1:8090/api/v1/consult?method=$request_method&path=$request_uri&ua=$http_user_agent&ip=$remote_addr;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_connect_timeout 50ms;
    proxy_read_timeout 200ms;
}

# Tum location'lardan once veya location / icinde auth_request ekleyin:
#   auth_request /_lg_consult;
#   error_page 403 = @lg_blocked;
#
# Tam server ornegi: examples/nginx/log-guardian-inline-site.conf
