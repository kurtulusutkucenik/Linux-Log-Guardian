# Log Guardian — inline consult (auth_request → :8090/api/v1/consult)
# ModSecurity inline alternatifi: istek upstream'e gitmeden WAF+CRS karari.
#
# Kurulum:
#   sudo bash scripts/merge_nginx_inline_consult.sh
#   sudo systemctl restart log-guardian
#   site server {} icine asagiyi uyarlayin:
#
#   include /etc/nginx/snippets/log-guardian-inline-consult.conf;
#   include /path/to/log-guardian-inline-site.conf;

include snippets/log-guardian-inline-consult.conf;

location / {
    auth_request /_lg_consult;
    error_page 403 = @lg_blocked;

    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location @lg_blocked {
    default_type application/json;
    return 403 '{"error":"blocked by log-guardian","source":"inline-consult"}';
}
