# nginx mTLS lab — ban API edge (127.0.0.1, yuksek port)
# Uretim: examples/nginx/snippets/log-guardian-api-mtls.conf
# Lab: bash scripts/mtls_client_issue.sh && bash scripts/ban_api_mtls_e2e.sh

worker_processes 1;
error_log "__MTLS_DIR__/logs/error.log" warn;
pid "__MTLS_DIR__/nginx.pid";

events {
    worker_connections 64;
}

http {
    access_log "__MTLS_DIR__/logs/access.log";

    server {
        listen 127.0.0.1:18443 ssl;
        server_name localhost;

        ssl_certificate     "__MTLS_DIR__/server.crt";
        ssl_certificate_key "__MTLS_DIR__/server.key";
        ssl_client_certificate "__MTLS_DIR__/ca.crt";
        ssl_verify_client on;
        ssl_verify_depth 2;
        ssl_protocols TLSv1.2 TLSv1.3;

        location /api/v1/ {
            if ($ssl_client_verify != SUCCESS) {
                return 403;
            }
            proxy_set_header X-Guardian-Token "MUTATION_TOKEN_PLACEHOLDER";
            proxy_set_header Host $host;
            proxy_pass http://127.0.0.1:8090;
            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
        }
    }
}
