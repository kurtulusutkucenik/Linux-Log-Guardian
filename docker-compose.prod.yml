# Log Guardian — Production stack (dashboard + TLS reverse proxy)
#
#   export JWT_SECRET=$(openssl rand -hex 32)
#   export DOMAIN=dashboard.example.com   # veya localhost (self-signed)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Dashboard portu DISARIDA acilmaz — yalnizca Caddy 80/443.
# API/metrics relay lg_internal bridge; host loopback API icin host-api-bridge (docker0).

services:
  # Linux: API_BIND=127.0.0.1 — bridge container'dan erisim icin docker0 uzerinde hop
  host-api-bridge:
    image: alpine/socat
    container_name: log-guardian-host-api-bridge
    network_mode: host
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        BR=$$(ip -4 addr show docker0 2>/dev/null | awk '/inet / {split($$2,a,"/"); print a[1]; exit}')
        [ -n "$$BR" ] || BR=172.17.0.1
        echo "[host-api-bridge] docker0=$$BR :18091->127.0.0.1:8090 :19092->127.0.0.1:9091"
        socat TCP-LISTEN:18091,bind=$$BR,fork,reuseaddr TCP:127.0.0.1:8090 &
        socat TCP-LISTEN:19092,bind=$$BR,fork,reuseaddr TCP:127.0.0.1:9091 &
        wait
    restart: unless-stopped

  metrics-relay:
    image: alpine/socat
    container_name: log-guardian-metrics-relay
    command: TCP-LISTEN:19091,fork,reuseaddr TCP:host.docker.internal:19092
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      host-api-bridge:
        condition: service_started
    networks:
      - lg_internal
    restart: unless-stopped

  ban-api-relay:
    image: alpine/socat
    container_name: log-guardian-ban-api-relay
    command: TCP-LISTEN:18090,fork,reuseaddr TCP:host.docker.internal:18091
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      host-api-bridge:
        condition: service_started
    networks:
      - lg_internal
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        DASHBOARD_SRC_REV: ${DASHBOARD_SRC_REV:-dev}
        NEXT_PUBLIC_DASHBOARD_BUILD_REV: ${DASHBOARD_BUILD_REV:-dev}
    container_name: log-guardian-dashboard
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - dashboard_data:/app/prisma
      - ${LG_DASHBOARD_DATA:-./.cache/dashboard-live}:/data/lg:ro
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET required — min 32 chars}
      - NODE_ENV=production
      - LOG_GUARDIAN_TIER=${LOG_GUARDIAN_TIER:-pro}  # pro | pro_plus | enterprise
      - DASHBOARD_SEED=${DASHBOARD_SEED:-0}
      - DASHBOARD_ADMIN_PASSWORD=${DASHBOARD_ADMIN_PASSWORD:-}
      - DASHBOARD_FLEET_API_KEY=${DASHBOARD_FLEET_API_KEY:-}
      - COPILOT_OLLAMA_URL=${COPILOT_OLLAMA_URL:-http://host.docker.internal:11434}
      - COPILOT_MODEL=${COPILOT_MODEL:-llama3.2:3b}
      - ATTACK_TREE_PATH=/data/lg/attack_tree.json
      - BENCH_DATA_DIR=/data/lg
      - SOC_TIMELINE_PREVIEW=0
      - INCIDENTS_ALLOW_SNAPSHOT=0
      - MARKETPLACE_SIGN_KEY=${MARKETPLACE_SIGN_KEY:-log-guardian-marketplace-dev-key}
      - MARKETPLACE_REQUIRE_SIG=${MARKETPLACE_REQUIRE_SIG:-1}
      - FLEET_COMMAND_HMAC_KEY=${FLEET_COMMAND_HMAC_KEY:-log-guardian-fleet-command-dev-key}
      - FLEET_COMMAND_REQUIRE_SIG=${FLEET_COMMAND_REQUIRE_SIG:-1}
      - GUARDIAN_API_URL=${GUARDIAN_API_URL:-http://ban-api-relay:18090}
      - GUARDIAN_BAN_URL=${GUARDIAN_BAN_URL:-http://ban-api-relay:18090}
      - GUARDIAN_API_TOKEN=${GUARDIAN_API_TOKEN:-}
      - GUARDIAN_API_MUTATION_TOKEN=${GUARDIAN_API_MUTATION_TOKEN:-}
      - DASHBOARD_JWT_EXPIRY=${DASHBOARD_JWT_EXPIRY:-24h}
      - DASHBOARD_JWT_IDLE_MIN=${DASHBOARD_JWT_IDLE_MIN:-0}
      - DASHBOARD_LOGIN_RL_LAB=${DASHBOARD_LOGIN_RL_LAB:-1}
      - GUARDIAN_METRICS_URL=${GUARDIAN_METRICS_URL:-http://metrics-relay:19091/metrics}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://host.docker.internal:9090}
      - NEXT_PUBLIC_GRAFANA_EMBED_URL=${NEXT_PUBLIC_GRAFANA_EMBED_URL:-http://127.0.0.1:3002/d/log-guardian-01/linux-log-guardian?orgId=1&refresh=15s&kiosk&theme=dark&var-tenant=default}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      host-api-bridge:
        condition: service_started
      ban-api-relay:
        condition: service_started
      metrics-relay:
        condition: service_started
    restart: unless-stopped
    networks:
      - lg_internal
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/tier').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    container_name: log-guardian-caddy
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
      - "${MTLS_API_PORT:-9443}:9443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-ops@localhost}
      - GUARDIAN_API_MUTATION_TOKEN=${GUARDIAN_API_MUTATION_TOKEN:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/mtls.d:/etc/caddy/mtls.d:ro
      - ./deploy/mtls:/etc/caddy/mtls:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      dashboard:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - lg_internal
    healthcheck:
      # Self-signed cert localhost için; 127.0.0.1 SNI uyumsuzluğu yapar
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "--no-check-certificate",
          "https://localhost/api/tier",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  lg_internal:
    driver: bridge

volumes:
  dashboard_data:
  caddy_data:
  caddy_config:
